name: Publish to NPM
on:
  release:
    types: [created]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - name: Run tests
        run: npm ci && npm test
  build-publish:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: npm registry
      url: https://www.npmjs.com/package/@frontendnetwork/veganify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies & build
        run: npm ci && npm run build
      - name: Publish package on NPM
        run: |
          npm publish --access public --ignore-scripts
          npm config set registry https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken ${{ secrets.GH_KEY }}
          npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  verify-install:
    needs: build-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - name: Install dependencies
        run: npm ci
      - name: Verify package installation
        run: |
          PACKAGE_VERSION=$(npm view @frontendnetwork/veganify version)
          echo "Latest version of the package is: $PACKAGE_VERSION"
          npm install @frontendnetwork/veganify@$PACKAGE_VERSION
